# Prometheus Configuration for 1C Dashboard Service
# Monitors: API, PostgreSQL, Redis, Nginx, System Resources

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'dashboard-saas'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# Rule files for alerts
rule_files:
  # - "alerts.yml"

# Scrape configurations
scrape_configs:
  # ============================================================================
  # Prometheus Self-Monitoring
  # ============================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # ============================================================================
  # FastAPI Application Metrics
  # ============================================================================
  - job_name: 'api'
    static_configs:
      - targets: ['api:8000']
        labels:
          service: 'api'
          environment: 'production'
    metrics_path: '/metrics'
    scheme: 'http'

  # ============================================================================
  # PostgreSQL Database Metrics
  # ============================================================================
  - job_name: 'postgres'
    static_configs:
      - targets: ['db:5432']
        labels:
          service: 'postgres'
    # Note: Requires postgres-exporter sidecar or custom exporter
    # For now, we rely on application-level DB metrics

  # ============================================================================
  # Redis Cache Metrics
  # ============================================================================
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
        labels:
          service: 'redis'
    # Note: Requires redis-exporter sidecar
    # For now, we rely on application-level Redis metrics

  # ============================================================================
  # Nginx Metrics
  # ============================================================================
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']
        labels:
          service: 'nginx'
    # Note: Requires nginx-vts-exporter or stub_status module
    # Configure nginx to expose /stub_status endpoint

  # ============================================================================
  # Node Exporter (System Metrics)
  # ============================================================================
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'
    # Note: Add node-exporter service to docker-compose if needed
