rule_id: revenue_forecast
name: "Прогноз выручки"
category: forecasting
priority: 9

description: |
  Прогнозирование выручки на 1, 3, 6 и 12 месяцев вперёд.
  Использует ансамбль моделей (Prophet, ARIMA, XGBoost) с авто-выбором лучшей.

required_data:
  fields: [revenue, date]
  min_records: 90  # минимум 3 месяца для прогноза
  time_span_days: 90
  frequency: daily|weekly|monthly

calculation:
  type: time_series_forecasting
  models:
    - name: prophet
      params:
        seasonality_mode: additive
        changepoint_prior_scale: 0.05
      min_periods: 180
    - name: sarima
      params:
        auto_arima: true
        seasonal: true
      min_periods: 365
    - name: xgboost
      params:
        n_estimators: 100
        max_depth: 6
      min_periods: 180
      features: [lag_features, rolling_stats, seasonality_indicators]
  
  model_selection:
    method: cross_validation
    metric: mape
    cv_folds: 5
  
  forecast_horizons:
    - period: 1 month
      confidence_levels: [0.8, 0.95]
    - period: 3 months
      confidence_levels: [0.8, 0.95]
    - period: 6 months
      confidence_levels: [0.8, 0.95]
    - period: 12 months
      confidence_levels: [0.8, 0.95]

ui:
  component: line_chart_with_forecast
  config:
    show_historical: true
    show_confidence_interval: true
    show_decomposition: true
    decomposition_components: [trend, seasonality, residuals]
  
  secondary:
    - component: kpi_card
      title: "Прогноз на следующий месяц"
      format: "{value} руб."
    - component: table
      title: "Детали прогноза"
      columns: [period, forecast, lower_bound, upper_bound, accuracy]

filters_required: [date_range, category]
industry: [retail, wholesale, production, services]

accuracy_metrics:
  - mape
  - rmse
  - mae
  - mase

risk_flags:
  - if mape > 20: "⚠️ Высокая ошибка прогноза — проверьте стабильность данных"
  - if trend_change > 30%: "ℹ️ Ожидается значительное изменение тренда"

export_formats: [png, pdf, xlsx, pptx]
