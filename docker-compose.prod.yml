# Production Docker Compose Configuration
# Includes: API, PostgreSQL, Redis, Nginx (SSL), Prometheus, Backup Cron

version: '3.8'

services:
  # ============================================================================
  # API Service (FastAPI)
  # ============================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: dashboard_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://dashboard_user:${DB_PASSWORD:-change_me}@db:5432/dashboard_prod
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
      - APP_ENV=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    networks:
      - dashboard_network
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================================
  # PostgreSQL Database
  # ============================================================================
  db:
    image: postgres:15-alpine
    container_name: dashboard_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: dashboard_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
      POSTGRES_DB: dashboard_prod
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups/postgres:/backups
    networks:
      - dashboard_network
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashboard_user -d dashboard_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres 
      -c shared_preload_libraries=pg_stat_statements 
      -c max_connections=200 
      -c work_mem=4MB 
      -c maintenance_work_mem=64MB

  # ============================================================================
  # Redis (Cache & Broker)
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: dashboard_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - dashboard_network
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Nginx (Reverse Proxy with SSL)
  # ============================================================================
  nginx:
    image: nginx:alpine
    container_name: dashboard_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - api
    networks:
      - dashboard_network

  # ============================================================================
  # Prometheus (Monitoring)
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: dashboard_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - dashboard_network
    expose:
      - "9090"

  # ============================================================================
  # Grafana (Visualization)
  # ============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: dashboard_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - dashboard_network
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  # ============================================================================
  # Backup Cron Service
  # ============================================================================
  backup:
    image: postgres:15-alpine
    container_name: dashboard_backup
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://dashboard_user:${DB_PASSWORD:-change_me}@db:5432/dashboard_prod
    volumes:
      - ./scripts/backup_db.sh:/backup_db.sh:ro
      - ./backups/postgres:/backups
      - ./.env:/.env:ro
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "apk add --no-cache bash &&
       while true; do
         now=$$(date +\%H:\%M);
         if [ \"$$now\" = \"03:00\" ]; then
           echo \"Running backup at $$(date)\";
           /backup_db.sh;
         fi;
         sleep 60;
       done"
    depends_on:
      - db
    networks:
      - dashboard_network

networks:
  dashboard_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
