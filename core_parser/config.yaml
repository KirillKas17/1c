# Настройки пользовательской организации (для парсинга актов сверки)
user_organization:
  name: "ООО ТоргСнаб"      # Название нашей организации
  inn: "1650364490"         # ИНН нашей организации

classifier:
  mode: "ensemble"          # используем все методы для лучшего качества
  use_rules: true
  use_ml: true               # включаем ML для улучшения классификации
  use_bert: false             # выключаем BERT для экономии памяти при тестировании

# Настройки истории обработки
processing_history:
  enabled: true               # Включить ведение истории обработки
  cleanup_days: 180          # Автоматически удалять записи старше N дней (0 = не удалять)

pdf_extractor:
  ocr_enabled: true
  ocr_lang: "ru,en"
  ocr_gpu: false
  ocr_model_dir: "easyocr_models"
  min_text_length_for_ocr_fallback: 300
  # Поддержка изображений
  support_images: true
  supported_image_formats: ['.jpg', '.jpeg', '.png', '.bmp', '.tiff', '.tif', '.webp']

# Настройки OCR и предобработки
ocr:
  use_confidence_selection: true   # Выбор лучшего варианта по confidence вместо длины текста
  heavy_preprocessing: false        # Отключена тяжелая предобработка - используем только key-value парсер для актов сверки
  remove_seals: false               # Отключено удаление печатей - используем только key-value парсер
  ocr_version: "PP-OCRv4"          # Версия OCR модели
  rec_model: "ru_PP-OCRv4_rec_infer"  # Модель распознавания (можно указать ru_PP-OCRv4_rec_server_infer для лучшего качества)

# Настройки удаления печатей и подписей
seal_removal:
  blue_range:
    h_min: 90
    h_max: 130
    s_min: 40  # Снижаем для более широкого захвата синих печатей
    s_max: 255
    v_min: 30  # Снижаем для темных печатей
    v_max: 255
  purple_range:
    h_min: 130
    h_max: 160
    s_min: 40
    s_max: 255
    v_min: 30
    v_max: 255
  min_seal_area: 50  # Уменьшаем для мелких печатей
  inpaint_radius: 5  # Увеличиваем радиус для лучшего закрашивания
  inpaint_method: "telea"  # "telea" или "ns"

# Настройки предобработки изображений для улучшения качества OCR
image_preprocessing:
  # Автоматическое определение необходимости предобработки
  auto_detect_quality: true
  min_blur_threshold: 100.0      # Минимальная метрика размытости (метод Лапласа)
  min_contrast_threshold: 20.0   # Минимальная контрастность
  
  # Включенные методы предобработки
  adaptive_threshold: true        # Адаптивная бинаризация
  deskew: true                    # Выравнивание документа (де-скью)
  contrast_enhancement: true      # Улучшение контрастности (CLAHE)
  noise_removal: true             # Удаление шума
  sharpening: true                # Улучшение резкости
  
  # Быстрая обработка для хороших изображений
  fast_mode_threshold: 150.0      # Порог для быстрого режима (выше = чаще используется)

# Настройки предобработки для фото (оптимизировано для PaddleOCR)
photo_preprocessing:
  # Параметры CLAHE (агрессивные для улучшения контраста)
  clahe_clip_limit: 4.0
  clahe_tile_size: 8
  
  # Масштабирование (увеличение для лучшего распознавания)
  min_size_for_scale: 1500
  target_size: 3000
  
  # Выравнивание
  deskew_threshold: 0.5
  
  # Удаление шума (мягкое, чтобы сохранить детали текста)
  denoise_h: 8
  denoise_template_size: 7
  denoise_search_size: 21

# =============================================
# Документные сигнатуры — вечная версия 2025+
