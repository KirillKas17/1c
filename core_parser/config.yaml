field_patterns:
  inn:
    pattern: r'ИНН\s*[:\-\/]?[\s]*(\d{12}|\d{10})'
    validate: 'digits_10_12'
  kpp:
    pattern: r'КПП\s*[:\-\/]?[\s]*(\d{9})'
    validate: 'digits_9'
  amount:
    patterns:
      - pattern: r'(?:всего\s+к\s+оплате|итого\s+к\s+оплате)[\s:‑\-\/]*([\d\s,\.]+)'
        priority: 10
        context_keywords: ['всего', 'к оплате', 'итого']
      - pattern: r'(?:сумма|итого)[\s:‑\-\/]*([\d\s,\.]+)'
        priority: 8
        context_keywords: ['сумма', 'итого']
      - pattern: r'([\d\s,\.]+)\s*(?:руб|рублей|р\.)'
        priority: 5
        context_keywords: ['руб']
    validate: 'float'
  
  # Цена БЕЗ НДС (нетто)
  amount_without_vat:
    patterns:
      - pattern: r'(?:сумма\s+без\s+ндс|без\s+налога|база\s+для\s+ндс|стоимость\s+без\s+налога)[\s:‑\-\/]*([\d\s,\.]+)'
        priority: 10
        context_keywords: ['без ндс', 'без налога', 'база']
      - pattern: r'(?:итого\s+без\s+ндс|всего\s+без\s+налога)[\s:‑\-\/]*([\d\s,\.]+)'
        priority: 9
        context_keywords: ['без ндс', 'без налога']
      - pattern: r'([\d\s,\.]+)\s*(?:руб\.)?\s*\(без\s+ндс\)'
        priority: 8
        context_keywords: ['без ндс']
    validate: 'float'
  
  # Цена С НДС (брутто)
  amount_with_vat:
    patterns:
      - pattern: r'(?:сумма\s+с\s+ндс|включая\s+ндс|с\s+учетом\s+налога|стоимость\s+с\s+налогом)[\s:‑\-\/]*([\d\s,\.]+)'
        priority: 10
        context_keywords: ['с ндс', 'с налогом', 'включая ндс']
      - pattern: r'(?:итого\s+с\s+ндс|всего\s+с\s+налогом)[\s:‑\-\/]*([\d\s,\.]+)'
        priority: 9
        context_keywords: ['с ндс', 'с налогом']
      - pattern: r'([\d\s,\.]+)\s*(?:руб\.)?\s*\(в\s+т\.ч\.\s*ндс\)'
        priority: 8
        context_keywords: ['в т.ч.', 'ндс']
    validate: 'float'
  
  # НДС (сумма налога)
  vat_amount:
    patterns:
      - pattern: r'(?:ндс|налог)[\s:‑\-\/]*(?:в\s+том\s+числе\s+)?([\d\s,\.]+)'
        priority: 10
        context_keywords: ['ндс', 'налог']
      - pattern: r'([\d\s,\.]+)\s*(?:руб\.)?\s*\(ндс\s+(\d+)%\)'
        priority: 9
        context_keywords: ['ндс']
      - pattern: r'ндс\s+(\d+)%?\s*[:\-]\s*([\d\s,\.]+)'
        priority: 8
